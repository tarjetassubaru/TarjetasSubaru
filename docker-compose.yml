services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://neondb_owner:npg_QfkBM1vb3wqh@ep-rapid-mountain-aipyq8u6.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
